services:
  cluefactory-ha-mcp:
    build: .
    container_name: cluefactory-ha-mcp
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8000}:${MCP_PORT:-8000}"
    environment:
      - HA_URL
      - HA_TOKEN
      - MCP_PORT
      - MCP_ALLOWED_NETWORKS
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - MCP_SSL_DIR
      - MCP_SSL_DIR_MOUNT
    volumes:
      # MCP_SSL_DIR = host path to letsencrypt config root (so archive/ symlinks resolve)
      # MCP_SSL_DIR_MOUNT = full container path to cert dir, read by server.py
      # e.g. MCP_SSL_DIR=/path/to/letsencrypt/config  MCP_SSL_DIR_MOUNT=/etc/letsencrypt/live/yourdomain.com
      - ${MCP_SSL_DIR}:/etc/letsencrypt:ro
    # Optional: connect to the same Docker network as Home Assistant
    # networks:
    #   - homeassistant
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8000),timeout=5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Uncomment if you run HA in Docker and want them on the same network:
# networks:
#   homeassistant:
#     external: true
